name: spendwise
description: "SpendWise - Intelligent cross-platform personal finance management application with SMS auto-recording, multi-account management, and advanced analytics."

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_sticky_header: ^0.8.0
  drift: ^2.26.0
  drift_flutter: ^0.2.4
  path: ^1.9.0
  path_provider: ^2.1.5
  sqlite3_flutter_libs: ^0.5.24
  fluttertoast: ^8.2.4
  flutter_riverpod: ^2.6.1
  pdf: ^3.11.0
  open_file: ^3.5.10
  permission_handler: ^11.4.0
  uuid: ^4.5.1
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  drift_dev: ^2.26.0
  build_runner: ^2.4.15
  mocktail: ^1.0.4


flutter:

  uses-material-design: true

  assets:
    - assets/SpendWise.png
    - assets/fonts/NotoSans-Regular.ttf
    - assets/fonts/NotoSans-Bold.ttf
    - assets/fonts/NotoEmoji.ttf